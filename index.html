<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff8ec">
  <title>开心消除</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #697386;
      --paper: #fff8ec;
      --paper-strong: #ffffff;
      --board: #20304c;
      --board-deep: #152238;
      --coral: #ec5d48;
      --yellow: #ffc447;
      --teal: #20a58f;
      --line: #ded7cb;
      --shadow: 0 14px 34px rgba(42, 40, 34, 0.16);
      --board-size: min(54vh, 540px, calc(100vw - 360px));
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow-x: hidden;
      background:
        linear-gradient(rgba(23, 32, 51, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 32, 51, 0.045) 1px, transparent 1px),
        var(--paper);
      background-size: 32px 32px;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .app-shell {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      min-height: 66px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px clamp(14px, 3vw, 42px);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 248, 236, 0.94);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      position: relative;
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      background: var(--coral);
      border: 3px solid var(--ink);
      border-radius: 50% 46% 48% 52%;
      box-shadow: 3px 3px 0 var(--yellow);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: white;
      opacity: 0.82;
    }

    .brand-mark::before {
      top: 7px;
      left: 8px;
    }

    .brand-mark::after {
      right: 7px;
      bottom: 8px;
      width: 6px;
      height: 6px;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(20px, 2.2vw, 28px);
      line-height: 1.05;
      font-weight: 900;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 2px solid var(--ink);
      border-radius: 6px;
      background: var(--paper-strong);
      color: var(--ink);
      box-shadow: 2px 2px 0 var(--ink);
      cursor: pointer;
      font-size: 21px;
      line-height: 1;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    .icon-button:hover {
      background: var(--yellow);
    }

    .icon-button:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .icon-button:focus-visible,
    .tile:focus-visible,
    .primary-button:focus-visible {
      outline: 4px solid rgba(32, 165, 143, 0.35);
      outline-offset: 2px;
    }

    .game-layout {
      width: min(1080px, 100%);
      margin: auto;
      padding: clamp(14px, 2.4vw, 28px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 250px;
      gap: clamp(18px, 3vw, 34px);
      align-items: center;
    }

    .play-column {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .score-strip {
      width: var(--board-size);
      display: grid;
      grid-template-columns: 1fr 1.15fr 0.8fr;
      border: 2px solid var(--ink);
      background: var(--paper-strong);
      box-shadow: 4px 4px 0 var(--ink);
    }

    .score-item {
      min-width: 0;
      padding: 8px 12px 9px;
    }

    .score-item + .score-item {
      border-left: 2px solid var(--ink);
    }

    .score-label {
      display: block;
      margin-bottom: 2px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
    }

    .score-value {
      display: block;
      overflow: hidden;
      font-size: clamp(18px, 2.5vw, 27px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      font-weight: 900;
      text-overflow: ellipsis;
    }

    .score-item.target .score-value {
      color: var(--teal);
    }

    .score-item.moves .score-value {
      color: var(--coral);
    }

    .progress-track {
      grid-column: 1 / -1;
      height: 7px;
      border-top: 2px solid var(--ink);
      background: #eee8dd;
      overflow: hidden;
    }

    .progress-fill {
      width: 0;
      height: 100%;
      background: var(--teal);
      transition: width 300ms ease;
    }

    .battle-lane {
      position: relative;
      isolation: isolate;
      width: var(--board-size);
      height: 150px;
      border: 3px solid var(--ink);
      border-radius: 8px;
      background:
        linear-gradient(180deg, #b9dddd 0 39%, #91b995 40% 49%, #607d51 50% 100%);
      box-shadow: 4px 4px 0 var(--ink);
      overflow: hidden;
    }

    .battle-lane::before {
      content: "";
      position: absolute;
      z-index: 0;
      left: 0;
      right: 0;
      top: 48px;
      height: 28px;
      background:
        linear-gradient(135deg, transparent 0 34%, #52764d 35% 62%, transparent 63%) 0 0 / 48px 28px repeat-x;
      opacity: 0.85;
    }

    .battle-lane::after {
      content: "";
      position: absolute;
      z-index: 0;
      inset: 0 0 auto;
      height: 58px;
      background:
        radial-gradient(circle at 78% 34%, rgba(255, 220, 112, 0.95) 0 8px, rgba(255, 235, 166, 0.38) 9px 15px, transparent 16px),
        linear-gradient(164deg, transparent 0 58%, rgba(68, 103, 79, 0.24) 59% 67%, transparent 68%);
      pointer-events: none;
    }

    .lane-scenery {
      position: absolute;
      z-index: 1;
      inset: 0;
      pointer-events: none;
    }

    .shrub {
      position: absolute;
      bottom: 68px;
      width: 36px;
      height: 19px;
      border: 2px solid var(--ink);
      border-radius: 50% 50% 34% 34%;
      background: #4e744c;
      box-shadow: 13px 3px 0 -2px #628b55, -12px 5px 0 -3px #3f6645;
    }

    .shrub-a { left: 29%; }
    .shrub-b { left: 71%; transform: scale(0.72); }

    .dead-tree {
      position: absolute;
      right: 18%;
      bottom: 68px;
      width: 7px;
      height: 31px;
      border: 2px solid var(--ink);
      background: #655340;
      transform: skewX(-8deg);
    }

    .dead-tree::before,
    .dead-tree::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 4px;
      border: 2px solid var(--ink);
      background: #655340;
      transform-origin: right center;
    }

    .dead-tree::before {
      top: 5px;
      left: -16px;
      transform: rotate(28deg);
    }

    .dead-tree::after {
      top: 13px;
      left: 3px;
      transform: rotate(-34deg);
    }

    .road-sign {
      position: absolute;
      right: 5%;
      bottom: 67px;
      width: 5px;
      height: 28px;
      border: 2px solid var(--ink);
      background: #6c503e;
    }

    .road-sign::before {
      content: "→";
      position: absolute;
      top: -16px;
      left: -18px;
      width: 38px;
      height: 18px;
      display: grid;
      place-items: center;
      border: 2px solid var(--ink);
      background: #c8a76b;
      color: var(--ink);
      font-size: 12px;
      font-weight: 900;
    }

    .battle-road {
      position: absolute;
      z-index: 2;
      left: 0;
      right: 0;
      bottom: 5px;
      height: 76px;
      border-top: 3px solid var(--ink);
      border-bottom: 3px solid var(--ink);
      background-color: #9b8a73;
      background-image:
        linear-gradient(32deg, rgba(255, 255, 255, 0.11) 12%, transparent 13% 85%, rgba(23, 32, 51, 0.14) 86%),
        linear-gradient(90deg, rgba(23, 32, 51, 0.18) 2px, transparent 2px),
        linear-gradient(rgba(23, 32, 51, 0.18) 2px, transparent 2px);
      background-size: 66px 38px, 66px 38px, 66px 38px;
      box-shadow: inset 0 7px rgba(255, 255, 255, 0.08), 0 -6px 0 #557a49;
    }

    .danger-line {
      position: absolute;
      z-index: 3;
      left: 14%;
      bottom: 7px;
      width: 11px;
      height: 72px;
      border-left: 2px dashed rgba(255, 236, 174, 0.9);
      border-right: 2px dashed rgba(23, 32, 51, 0.25);
      background: rgba(255, 196, 71, 0.08);
      opacity: 0.68;
      transition: width 220ms ease, background 220ms ease, opacity 220ms ease;
    }

    .battle-lane.danger-near .danger-line {
      width: 46px;
      background: repeating-linear-gradient(135deg, rgba(255, 196, 71, 0.2) 0 6px, rgba(236, 93, 72, 0.12) 6px 12px);
      opacity: 0.92;
    }

    .battle-lane.danger-critical .danger-line {
      width: 68px;
      background: repeating-linear-gradient(135deg, rgba(236, 93, 72, 0.34) 0 6px, rgba(255, 196, 71, 0.16) 6px 12px);
      animation: dangerPulse 520ms ease-in-out infinite alternate;
    }

    .spawn-rift {
      position: absolute;
      z-index: 3;
      right: -10px;
      bottom: 9px;
      width: 28px;
      height: 72px;
      border: 3px solid rgba(23, 32, 51, 0.84);
      border-radius: 50%;
      background: radial-gradient(ellipse, #d7f4a8 0 12%, #66b86f 31%, #2d5c48 58%, rgba(23, 32, 51, 0.06) 72%);
      box-shadow: 0 0 0 3px rgba(181, 224, 137, 0.18), 0 0 18px rgba(69, 189, 114, 0.72);
      transform: skewX(-7deg);
      animation: riftPulse 860ms ease-in-out infinite alternate;
    }

    .battle-road::before,
    .battle-road::after {
      content: "";
      position: absolute;
      border: 2px solid rgba(23, 32, 51, 0.32);
      border-radius: 50%;
      background: #716756;
    }

    .battle-road::before {
      left: 36%;
      top: 14px;
      width: 8px;
      height: 4px;
      box-shadow: 88px 25px 0 -1px #716756, 177px 4px 0 -1px #716756, 248px 31px 0 -1px #716756;
    }

    .battle-road::after {
      left: 17%;
      bottom: 7px;
      width: 5px;
      height: 3px;
      box-shadow: 132px -27px 0 -1px #716756, 219px -10px 0 -1px #716756, 325px -28px 0 -1px #716756;
    }

    .wall-health {
      position: absolute;
      z-index: 8;
      top: 6px;
      left: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 7px;
      border: 2px solid var(--ink);
      border-radius: 5px;
      background: white;
      font-size: 10px;
      font-weight: 900;
    }

    .wall-health-track {
      width: 76px;
      height: 8px;
      border: 1px solid var(--ink);
      background: #ece6dc;
      overflow: hidden;
    }

    .wall-health-fill {
      width: 100%;
      height: 100%;
      background: var(--teal);
      transition: width 240ms ease, background 240ms ease;
    }

    .battle-lane.wall-danger .wall-health-fill {
      background: var(--coral);
    }

    .wave-badge {
      position: absolute;
      z-index: 8;
      top: 6px;
      right: 8px;
      padding: 4px 7px;
      border: 2px solid var(--ink);
      border-radius: 5px;
      background: var(--yellow);
      font-size: 10px;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .wave-badge i {
      font-style: normal;
      opacity: 0.55;
    }

    .attack-banner {
      position: absolute;
      z-index: 9;
      top: 35px;
      left: 50%;
      min-width: 112px;
      padding: 4px 9px;
      border: 2px solid var(--ink);
      border-radius: 5px;
      background: white;
      color: var(--attack-color, var(--ink));
      box-shadow: 2px 2px 0 var(--ink);
      font-size: 10px;
      font-weight: 900;
      text-align: center;
      opacity: 0;
      transform: translate(-50%, -5px);
      pointer-events: none;
    }

    .attack-banner.show {
      animation: attackBanner 760ms ease-out forwards;
    }

    .wave-callout {
      position: absolute;
      z-index: 12;
      left: 50%;
      top: 52%;
      padding: 7px 14px;
      border: 3px solid var(--ink);
      border-radius: 5px;
      background: var(--yellow);
      color: var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      font-size: 18px;
      font-weight: 900;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      animation: waveCallout 1100ms ease-out forwards;
    }

    .castle-wall {
      position: absolute;
      z-index: 4;
      left: 7px;
      bottom: 5px;
      width: 67px;
      height: 94px;
      border: 3px solid var(--ink);
      background:
        linear-gradient(90deg, transparent 47%, rgba(23, 32, 51, 0.25) 48%, rgba(23, 32, 51, 0.25) 52%, transparent 53%),
        linear-gradient(transparent 47%, rgba(23, 32, 51, 0.25) 48%, rgba(23, 32, 51, 0.25) 52%, transparent 53%),
        #8d9190;
      background-size: 24px 19px;
      box-shadow: inset 7px 0 rgba(255, 255, 255, 0.18), inset -5px 0 rgba(23, 32, 51, 0.14);
    }

    .castle-wall::before {
      content: "";
      position: absolute;
      left: -3px;
      right: -3px;
      top: -13px;
      height: 16px;
      border: 3px solid var(--ink);
      background: repeating-linear-gradient(90deg, #8d9190 0 12px, transparent 12px 18px);
      clip-path: polygon(0 0, 22% 0, 22% 48%, 40% 48%, 40% 0, 62% 0, 62% 48%, 80% 48%, 80% 0, 100% 0, 100% 100%, 0 100%);
    }

    .castle-wall::after {
      content: "";
      position: absolute;
      left: 18px;
      bottom: -3px;
      width: 18px;
      height: 29px;
      border: 3px solid var(--ink);
      border-bottom: 0;
      border-radius: 9px 9px 0 0;
      background: #363c42;
      box-shadow: inset 4px 0 rgba(255, 255, 255, 0.12);
    }

    .wall-power-core {
      position: absolute;
      z-index: 5;
      top: 33px;
      right: 7px;
      width: 20px;
      height: 20px;
      border: 2px solid var(--ink);
      border-radius: 50%;
      background:
        radial-gradient(circle, white 0 20%, transparent 22%),
        conic-gradient(var(--yellow) calc(var(--charge, 0) * 1%), #5f6871 0);
      box-shadow: inset 0 0 0 3px #303942, 0 0 4px rgba(255, 196, 71, 0.35);
      transition: filter 180ms ease, box-shadow 180ms ease;
    }

    .battle-lane.power-ready .wall-power-core {
      filter: brightness(1.25);
      box-shadow: inset 0 0 0 3px #303942, 0 0 12px 3px rgba(255, 196, 71, 0.78);
      animation: coreReady 380ms ease-in-out infinite alternate;
    }

    .battle-lane.barrage::before {
      opacity: 1;
      filter: brightness(1.45) saturate(1.3);
    }

    .battle-lane.barrage {
      animation: barrageFlash 760ms ease-out;
    }

    .monster-layer,
    .battle-effects {
      position: absolute;
      z-index: 3;
      inset: 0;
      pointer-events: none;
    }

    .battle-effects {
      z-index: 6;
    }

    .monster {
      position: absolute;
      bottom: 7px;
      width: 48px;
      height: 88px;
      transform: translateX(-50%);
      transition: left 110ms linear;
    }

    .zombie-figure {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 48px;
      height: 72px;
      filter: drop-shadow(3px 3px 0 rgba(23, 32, 51, 0.25));
      animation: zombieLurch 640ms ease-in-out infinite alternate;
    }

    .zombie-head {
      position: absolute;
      z-index: 4;
      top: 2px;
      left: 15px;
      width: 25px;
      height: 28px;
      border: 2px solid var(--ink);
      border-radius: 38% 46% 42% 30%;
      background: #87927a;
      box-shadow: inset 5px 0 rgba(255, 255, 255, 0.12);
      transform: rotate(-4deg);
    }

    .zombie-head::before {
      content: "";
      position: absolute;
      z-index: 2;
      top: -5px;
      left: 1px;
      width: 20px;
      height: 9px;
      border: 2px solid var(--ink);
      border-bottom: 0;
      background: #353b3b;
      clip-path: polygon(0 70%, 12% 0, 28% 54%, 47% 0, 65% 58%, 86% 6%, 100% 72%, 100% 100%, 0 100%);
    }

    .zombie-eye {
      position: absolute;
      z-index: 3;
      top: 8px;
      width: 5px;
      height: 6px;
      border: 1px solid var(--ink);
      border-radius: 50%;
      background: #d8d2b4;
    }

    .zombie-eye.left { left: 5px; }
    .zombie-eye.right { right: 4px; }

    .zombie-eye::after {
      content: "";
      position: absolute;
      right: 1px;
      bottom: 1px;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--ink);
    }

    .zombie-jaw {
      position: absolute;
      left: 7px;
      bottom: -5px;
      width: 15px;
      height: 9px;
      border: 2px solid var(--ink);
      background:
        repeating-linear-gradient(90deg, #d4d0b4 0 3px, #47443d 3px 4px);
      transform: skewX(-8deg);
    }

    .zombie-torso {
      position: absolute;
      z-index: 3;
      top: 29px;
      left: 13px;
      width: 27px;
      height: 28px;
      border: 2px solid var(--ink);
      background: #5d4c48;
      clip-path: polygon(0 0, 100% 0, 92% 82%, 74% 76%, 58% 100%, 39% 82%, 18% 94%);
      box-shadow: inset 6px 0 rgba(255, 255, 255, 0.1);
    }

    .zombie-torso::before {
      content: "";
      position: absolute;
      top: 0;
      left: 11px;
      width: 2px;
      height: 24px;
      background: rgba(23, 32, 51, 0.5);
      box-shadow: -7px 6px 0 -1px rgba(255, 255, 255, 0.18);
    }

    .zombie-arm {
      position: absolute;
      z-index: 2;
      top: 32px;
      width: 8px;
      height: 30px;
      border: 2px solid var(--ink);
      border-radius: 5px;
      background: linear-gradient(#5d4c48 0 42%, #87927a 43% 100%);
      transform-origin: top center;
    }

    .zombie-arm.left {
      left: 7px;
      transform: rotate(19deg);
      animation: armSwingLeft 640ms ease-in-out infinite alternate;
    }

    .zombie-arm.right {
      right: 2px;
      transform: rotate(-57deg);
      animation: armSwingRight 640ms ease-in-out infinite alternate;
    }

    .zombie-leg {
      position: absolute;
      z-index: 1;
      top: 52px;
      width: 9px;
      height: 21px;
      border: 2px solid var(--ink);
      border-radius: 0 0 4px 4px;
      background: #343a3d;
      transform-origin: top center;
    }

    .zombie-leg.left {
      left: 16px;
      animation: legStepLeft 640ms ease-in-out infinite alternate;
    }

    .zombie-leg.right {
      left: 30px;
      animation: legStepRight 640ms ease-in-out infinite alternate;
    }

    .monster.variant-1 .zombie-head {
      background: #77877c;
    }

    .monster.variant-1 .zombie-head::before {
      top: -7px;
      left: -4px;
      width: 30px;
      height: 12px;
      border-bottom: 2px solid var(--ink);
      border-radius: 50% 50% 22% 22%;
      background: #575d5e;
      clip-path: none;
    }

    .monster.variant-1 .zombie-torso,
    .monster.variant-1 .zombie-arm {
      background-color: #4b5b61;
    }

    .monster.variant-1 .zombie-arm {
      background: linear-gradient(#4b5b61 0 42%, #77877c 43% 100%);
    }

    .monster.variant-2 .zombie-head {
      background: #8c896f;
    }

    .monster.variant-2 .zombie-head::before {
      top: -6px;
      left: -3px;
      width: 29px;
      height: 11px;
      border-bottom: 2px solid var(--ink);
      background: #6d433b;
      clip-path: polygon(0 20%, 100% 0, 90% 100%, 5% 82%);
    }

    .monster.variant-2 .zombie-torso,
    .monster.variant-2 .zombie-arm {
      background-color: #6a5143;
    }

    .monster.variant-2 .zombie-arm {
      background: linear-gradient(#6a5143 0 42%, #8c896f 43% 100%);
    }

    .monster-health {
      position: absolute;
      z-index: 2;
      top: 0;
      left: 2px;
      width: 44px;
      height: 7px;
      border: 2px solid var(--ink);
      background: white;
    }

    .monster-health i {
      display: block;
      height: 100%;
      background: var(--coral);
      transition: width 160ms ease;
    }

    .monster-shield {
      position: absolute;
      z-index: 3;
      top: 8px;
      left: 0;
      width: 48px;
      height: 64px;
      border: 3px solid rgba(108, 197, 224, 0.92);
      border-radius: 48% 48% 42% 42%;
      background: linear-gradient(135deg, rgba(214, 246, 255, 0.2), rgba(63, 143, 177, 0.1));
      box-shadow: inset 0 0 8px rgba(185, 239, 255, 0.62), 0 0 7px rgba(66, 191, 232, 0.42);
      pointer-events: none;
    }

    .monster.shield-hit .monster-shield {
      animation: shieldHit 320ms ease-out;
    }

      background: #ff963c;
      border-radius: 20%;
      transform: rotate(45deg);
    }

    .type-1::after {
      transform: rotate(-68deg);
    }

    .type-2 {
      background: #45bd72;
      clip-path: polygon(25% 4%, 75% 4%, 100% 50%, 75% 96%, 25% 96%, 0 50%);
    }

    .type-3 {
      width: 68%;
      background: #42bfe8;
      border-radius: 45% 45% 20% 20%;
    }

    .type-4 {
      width: 86%;
      height: 86%;
      background: #9b68dc;
      border-radius: 50% 18% 50% 18%;
      transform: rotate(12deg);
    }

    .type-5 {
      background: #ffd44f;
      clip-path: polygon(50% 0, 62% 32%, 98% 35%, 70% 57%, 79% 94%, 50% 73%, 20% 94%, 30% 57%, 2% 35%, 38% 32%);
    }

    .special-candy {
      filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.9)) drop-shadow(0 4px 0 rgba(10, 19, 33, 0.3));
    }

    .special-candy::before {
      content: "";
      position: absolute;
      z-index: 2;
      pointer-events: none;
    }

    .special-row::before {
      left: -12%;
      right: -12%;
      top: 50%;
      height: 20%;
      border: 2px solid var(--ink);
      background: white;
      box-shadow: 0 0 6px var(--yellow);
      transform: translateY(-50%) rotate(-7deg);
    }

    .special-col::before {
      top: -12%;
      bottom: -12%;
      left: 50%;
      width: 20%;
      border: 2px solid var(--ink);
      background: white;
      box-shadow: 0 0 6px var(--yellow);
      transform: translateX(-50%) rotate(7deg);
    }

    .special-bomb::before {
      left: 50%;
      top: 50%;
      width: 42%;
      aspect-ratio: 1;
      border: 2px solid white;
      border-radius: 50%;
      background: var(--ink);
      box-shadow: 0 0 0 2px var(--yellow), 0 0 9px white;
      transform: translate(-50%, -50%);
    }

    .special-rainbow {
      width: 88%;
      height: 88%;
      border-radius: 50%;
      clip-path: none;
      background: conic-gradient(#f15a50, #ff963c, #ffd44f, #45bd72, #42bfe8, #9b68dc, #f15a50);
      transform: none;
      animation: rainbowCore 1.2s linear infinite;
    }

    .special-rainbow::before {
      inset: 22%;
      border: 2px solid var(--ink);
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 8px white;
    }

    .tile.special-forming .piece {
      animation: specialForm 460ms cubic-bezier(.16, .82, .25, 1.2) both;
    }

    .tile.special-triggered::before {
      content: "";
      position: absolute;
      z-index: 4;
      inset: -6px;
      border: 3px solid white;
      border-radius: 7px;
      box-shadow: 0 0 0 3px var(--yellow), 0 0 18px white;
      pointer-events: none;
      animation: specialTrigger 420ms ease-out forwards;
    }

    .battle-lane.resolving .monster {
      transition-duration: 180ms;
    }

    .battle-lane.resolving .spawn-rift {
      animation-duration: 1.4s;
      filter: saturate(0.72);
    }

    .tile.clearing .piece {
      animation: clearCandy 260ms ease-in forwards;
    }

    .tile.fresh .piece {
      animation: dropCandy 260ms cubic-bezier(.2, .85, .35, 1.25) both;
    }

    .board.invalid {
      animation: invalidBoard 260ms ease;
    }

    .board.shuffling .tile {
      animation: shuffleTile 430ms ease both;
      animation-delay: calc(var(--cell-index) * 4ms);
    }

    .float-score {
      position: absolute;
      z-index: 4;
      color: white;
      font-size: clamp(18px, 3vw, 30px);
      font-weight: 900;
      text-shadow: 0 3px 0 var(--ink), 2px 0 0 var(--ink), -2px 0 0 var(--ink);
      pointer-events: none;
      animation: floatScore 700ms ease-out forwards;
    }

    .side-panel {
      align-self: stretch;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-top: 4px solid var(--ink);
      border-bottom: 4px solid var(--ink);
    }

    .side-section {
      padding: 18px 4px;
    }

    .side-section + .side-section {
      border-top: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .combo-display {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }

    .combo-display strong {
      min-width: 0;
      font-size: clamp(24px, 4vw, 44px);
      line-height: 1;
      font-weight: 900;
      color: var(--coral);
    }

    .combo-display span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .stat-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px dashed var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .stat-line strong {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    .candy-rack {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 5px;
    }

    .mini-candy {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: white;
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
    }

    .mini-candy.active {
      border-color: var(--coral);
      box-shadow: 0 0 0 2px var(--yellow), 0 0 10px rgba(255, 196, 71, 0.72);
      transform: translateY(-3px) scale(1.06);
    }

    .mini-candy .candy {
      width: 64%;
      height: 64%;
      border-width: 2px;
      filter: drop-shadow(0 2px 0 rgba(10, 19, 33, 0.25));
    }

    .mini-candy .type-1,
    .mini-candy .type-3 {
      width: 54%;
    }

    .activity {
      min-height: 38px;
      margin: 0;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.5;
      font-weight: 800;
    }

    .stat-line .status-safe { color: var(--teal); }
    .stat-line .status-near { color: #c9821d; }
    .stat-line .status-critical { color: var(--coral); }

    .main-menu {
      position: fixed;
      z-index: 30;
      inset: 0;
      display: grid;
      place-items: start center;
      overflow: hidden;
      background: var(--paper);
      opacity: 0;
      visibility: hidden;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    .main-menu.open {
      opacity: 1;
      visibility: visible;
    }

    body.menu-open {
      overflow: hidden;
    }

    .menu-scene {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background:
        linear-gradient(rgba(23, 32, 51, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 32, 51, 0.04) 1px, transparent 1px),
        #fff8ec;
      background-size: 32px 32px;
    }

    .menu-road {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 31%;
      border-top: 4px solid var(--ink);
      background-color: #93826d;
      background-image:
        linear-gradient(30deg, rgba(255, 255, 255, 0.1) 12%, transparent 13% 86%, rgba(23, 32, 51, 0.14) 87%),
        linear-gradient(90deg, rgba(23, 32, 51, 0.2) 2px, transparent 2px),
        linear-gradient(rgba(23, 32, 51, 0.2) 2px, transparent 2px);
      background-size: 74px 46px;
      box-shadow: inset 0 10px rgba(255, 255, 255, 0.08), 0 -13px 0 #5f854f;
    }

    .menu-wall {
      left: 9%;
      bottom: 6%;
      transform: scale(1.65);
      transform-origin: left bottom;
    }

    .menu-zombie {
      position: absolute;
      right: 12%;
      bottom: 9%;
      width: 48px;
      height: 82px;
      transform: scale(1.7);
      transform-origin: center bottom;
    }

    .menu-zombie .zombie-figure {
      left: 0;
      bottom: 0;
    }

    .menu-candy {
      position: absolute;
      z-index: 2;
      width: 58px;
      height: 58px;
      animation: menuCandyFloat 1.5s ease-in-out infinite alternate;
    }

    .menu-candy.candy-a { left: 10%; top: 15%; }
    .menu-candy.candy-b { right: 12%; top: 19%; animation-delay: 230ms; }
    .menu-candy.candy-c { left: 18%; top: 45%; animation-delay: 420ms; }
    .menu-candy.candy-d { right: 18%; top: 46%; animation-delay: 610ms; }

    .menu-content {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: max(72px, 11vh);
      color: var(--ink);
      text-align: center;
    }

    .menu-kicker {
      padding: 5px 9px;
      border: 2px solid var(--ink);
      background: var(--yellow);
      font-size: 11px;
      font-weight: 900;
    }

    .menu-content h2 {
      margin: 14px 0 0;
      font-size: 62px;
      line-height: 1;
      font-weight: 900;
      text-shadow: 5px 5px 0 white, 8px 8px 0 var(--yellow);
    }

    .menu-content p {
      margin: 12px 0 22px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 900;
    }

    .start-game-button {
      width: 86px;
      height: 86px;
      display: grid;
      place-items: center;
      padding: 0 0 0 5px;
      border: 4px solid var(--ink);
      border-radius: 50%;
      background: var(--teal);
      color: white;
      box-shadow: 6px 6px 0 var(--ink);
      cursor: pointer;
      font-size: 40px;
      line-height: 1;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .start-game-button:hover {
      background: var(--coral);
      transform: translateY(-3px);
    }

    .start-game-button:active {
      transform: translate(6px, 6px);
      box-shadow: none;
    }

    .start-game-button:focus-visible {
      outline: 5px solid rgba(32, 165, 143, 0.35);
      outline-offset: 4px;
    }

    .start-game-label {
      margin-top: 12px;
      font-size: 15px;
      font-weight: 900;
    }

    .menu-record {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 2px solid var(--ink);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .menu-record strong {
      margin-left: 6px;
      color: var(--coral);
      font-size: 17px;
      font-variant-numeric: tabular-nums;
    }

    .modal-backdrop {
      position: fixed;
      z-index: 20;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(12, 20, 33, 0.72);
      backdrop-filter: blur(5px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    .modal-backdrop.open {
      opacity: 1;
      visibility: visible;
    }

    .result-modal {
      width: min(390px, 100%);
      padding: 30px;
      border: 3px solid var(--ink);
      border-radius: 8px;
      background: var(--paper-strong);
      box-shadow: 8px 8px 0 var(--yellow);
      text-align: center;
      transform: translateY(12px) scale(0.97);
      transition: transform 180ms ease;
    }

    .modal-backdrop.open .result-modal {
      transform: translateY(0) scale(1);
    }

    .result-icon {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      margin: 0 auto 14px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background: var(--yellow);
      font-size: 38px;
      line-height: 1;
    }

    .result-modal h2 {
      margin: 0;
      font-size: clamp(26px, 7vw, 38px);
      line-height: 1.1;
      font-weight: 900;
    }

    .result-modal p {
      margin: 10px 0 20px;
      color: var(--muted);
      font-weight: 700;
    }

    .result-score {
      display: block;
      color: var(--coral);
      font-size: 32px;
      font-variant-numeric: tabular-nums;
    }

    .primary-button {
      width: 100%;
      min-height: 48px;
      border: 2px solid var(--ink);
      border-radius: 6px;
      background: var(--teal);
      color: white;
      box-shadow: 4px 4px 0 var(--ink);
      cursor: pointer;
      font-weight: 900;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .primary-button:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }

    .confetti-layer {
      position: fixed;
      z-index: 19;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      top: -18px;
      width: 10px;
      height: 18px;
      border: 2px solid var(--ink);
      animation: confettiFall var(--duration) linear forwards;
      transform: translateX(0) rotate(0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes selectedPulse {
      from { transform: scale(1); }
      to { transform: scale(1.11); }
    }

    @keyframes menuCandyFloat {
      from { transform: translateY(0) rotate(-5deg); }
      to { transform: translateY(-11px) rotate(6deg); }
    }

    @keyframes hintBounce {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(-4px) scale(1.08); }
    }

    @keyframes attackBanner {
      0% { opacity: 0; transform: translate(-50%, -7px) scale(0.9); }
      16%, 70% { opacity: 1; transform: translate(-50%, 0) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -5px) scale(0.96); }
    }

    @keyframes waveCallout {
      0% { opacity: 0; transform: translate(-50%, -45%) scale(0.72); }
      22%, 67% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -58%) scale(1.08); }
    }

    @keyframes shieldHit {
      0% { opacity: 1; transform: scale(1); filter: brightness(1); }
      45% { opacity: 0.86; transform: scale(1.12); filter: brightness(1.8); }
      100% { opacity: 1; transform: scale(1); filter: brightness(1); }
    }

    @keyframes clearCandy {
      0% { transform: scale(1); opacity: 1; }
      45% { transform: scale(1.18) rotate(-6deg); opacity: 1; }
      100% { transform: scale(0.05) rotate(16deg); opacity: 0; }
    }

    @keyframes dropCandy {
      from { transform: translateY(-65%) scale(0.78); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes invalidBoard {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    @keyframes shuffleTile {
      0% { transform: scale(1); opacity: 1; }
      45% { transform: scale(0.2) rotate(20deg); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes floatScore {
      from { transform: translate(-50%, 0) scale(0.8); opacity: 0; }
      18% { opacity: 1; }
      to { transform: translate(-50%, -70px) scale(1.08); opacity: 0; }
    }

    @keyframes confettiFall {
      to { transform: translate(var(--drift), 110vh) rotate(var(--spin)); }
    }

    @keyframes zombieLurch {
      from { transform: translateY(0) rotate(-1deg) scale(var(--zombie-scale, 1)); }
      to { transform: translateY(-2px) rotate(2deg) scale(var(--zombie-scale, 1)); }
    }

    @keyframes armSwingLeft {
      from { transform: rotate(13deg); }
      to { transform: rotate(27deg); }
    }

    @keyframes armSwingRight {
      from { transform: rotate(-58deg); }
      to { transform: rotate(-40deg); }
    }

    @keyframes legStepLeft {
      from { transform: rotate(-11deg); }
      to { transform: rotate(10deg); }
    }

    @keyframes legStepRight {
      from { transform: rotate(12deg); }
      to { transform: rotate(-9deg); }
    }

    @keyframes impactBurst {
      from { transform: translate(-50%, -50%) scale(0.2); opacity: 1; }
      to { transform: translate(-50%, -50%) scale(2.1); opacity: 0; }
    }

    @keyframes fireFlicker {
      from { opacity: 0.86; box-shadow: 0 0 7px #ff762e, 0 0 13px rgba(255, 150, 60, 0.4); }
      to { opacity: 1; box-shadow: 0 0 13px #ff762e, 0 0 22px rgba(255, 150, 60, 0.72); }
    }

    @keyframes electricPulse {
      from { opacity: 0.72; filter: drop-shadow(0 0 4px #9b68dc); }
      to { opacity: 1; filter: drop-shadow(0 0 11px #d0a4ff); }
    }

    @keyframes starSpin {
      from { transform: rotate(0); }
      to { transform: rotate(360deg); }
    }

    @keyframes fireExplosion {
      0% { transform: translate(-50%, -50%) scale(0.15) rotate(-8deg); opacity: 0.2; }
      34% { transform: translate(-50%, -50%) scale(1.22) rotate(5deg); opacity: 1; }
      72% { transform: translate(-50%, -62%) scale(0.92) rotate(-3deg); opacity: 0.82; }
      100% { transform: translate(-50%, -90%) scale(0.45); opacity: 0; }
    }

    @keyframes particleFly {
      from { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      to { transform: translate(var(--particle-x), var(--particle-y)) scale(0.22) rotate(var(--particle-spin)); opacity: 0; }
    }

    @keyframes knockRecoil {
      0% { transform: translateX(0) rotate(0); }
      42% { transform: translateX(11px) rotate(7deg); }
      100% { transform: translateX(0) rotate(1deg); }
    }

    @keyframes toxicMist {
      from { transform: scale(0.88) translateY(2px); opacity: 0.56; }
      to { transform: scale(1.08) translateY(-2px); opacity: 0.88; }
    }

    @keyframes poisonBubble {
      0% { transform: translateY(0) scale(0.55); opacity: 0; }
      25% { opacity: 1; }
      100% { transform: translateY(-39px) scale(1.2); opacity: 0; }
    }

    @keyframes iceShimmer {
      from { opacity: 0.58; filter: brightness(0.95); }
      to { opacity: 0.92; filter: brightness(1.28); }
    }

    @keyframes stunOrbit {
      from { transform: rotate(0); }
      to { transform: rotate(360deg); }
    }

    @keyframes berryDefeat {
      0% { transform: translateX(0) scale(1); opacity: 1; }
      55% { transform: translateX(13px) scale(0.88) rotate(9deg); opacity: 0.8; }
      100% { transform: translateX(22px) scale(0.3) rotate(18deg); opacity: 0; }
    }

    @keyframes burnToAsh {
      0% { transform: translateY(0) scale(1); filter: brightness(1.5) sepia(0.4); opacity: 1; }
      42% { transform: translateY(-2px) scale(1.03); filter: brightness(1.2) sepia(1) saturate(2); opacity: 1; }
      76% { transform: translateY(5px) scaleX(0.9) scaleY(0.72); filter: brightness(0.35) grayscale(1); opacity: 0.82; }
      100% { transform: translateY(31px) scaleX(1.15) scaleY(0.06); filter: brightness(0.22) grayscale(1); opacity: 0; }
    }

    @keyframes deathFlame {
      0% { transform: scale(0.6); opacity: 0; }
      25% { transform: scale(1.08); opacity: 0.92; }
      72% { transform: translateY(-8px) scale(0.86); opacity: 0.7; }
      100% { transform: translateY(-29px) scale(0.25); opacity: 0; }
    }

    @keyframes ashRise {
      from { transform: translate(0, 0) scale(0.8); opacity: 0; }
      28% { opacity: 0.9; }
      to { transform: translate(var(--ash-x), var(--ash-y)) scale(0.25) rotate(170deg); opacity: 0; }
    }

    @keyframes poisonMelt {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      48% { transform: translateY(9px) scaleX(1.08) scaleY(0.82); opacity: 0.9; }
      100% { transform: translateY(50px) scaleX(1.55) scaleY(0.03); opacity: 0; }
    }

    @keyframes puddleSpread {
      0% { width: 8px; height: 5px; opacity: 0; }
      38% { opacity: 1; }
      78% { width: 67px; height: 16px; opacity: 0.95; }
      100% { width: 76px; height: 17px; opacity: 0; }
    }

    @keyframes iceStatueBreak {
      0%, 58% { transform: translateY(0) scale(1); opacity: 1; }
      72% { transform: translateY(-2px) scale(1.03) rotate(-2deg); opacity: 0.96; }
      100% { transform: translateY(12px) scale(0.28) rotate(12deg); opacity: 0; }
    }

    @keyframes iceShellCrack {
      0%, 52% { transform: scale(1); opacity: 0.82; filter: brightness(1); }
      67% { transform: scale(1.06); opacity: 1; filter: brightness(1.55); }
      100% { transform: scale(1.4); opacity: 0; filter: brightness(2); }
    }

    @keyframes skeletonFlash {
      0%, 18% { opacity: 0; transform: scale(0.92); filter: drop-shadow(0 0 2px #9b68dc); }
      24%, 72% { opacity: 1; transform: scale(1.03); filter: drop-shadow(0 0 8px #d6a7ff); }
      80% { opacity: 0.75; transform: scale(0.9); }
      100% { opacity: 0; transform: scale(0.22); }
    }

    @keyframes deathArcFlash {
      from { opacity: 0.25; filter: drop-shadow(0 0 2px #9b68dc); }
      to { opacity: 1; filter: drop-shadow(0 0 9px #d6a7ff); }
    }

    @keyframes starDissolve {
      0% { transform: scale(1) rotate(0); opacity: 1; }
      46% { transform: scale(0.82) rotate(8deg); filter: brightness(1.8); opacity: 0.92; }
      100% { transform: scale(0.08) rotate(30deg); filter: brightness(2.2); opacity: 0; }
    }

    @keyframes chainArcFlash {
      0% { opacity: 0; transform: translateY(-50%) scaleX(0.1); }
      20% { opacity: 1; transform: translateY(-50%) scaleX(1); }
      68% { opacity: 0.95; }
      100% { opacity: 0; transform: translateY(-50%) scaleX(1); }
    }

    @keyframes riftPulse {
      from { filter: brightness(0.86); transform: skewX(-7deg) scaleX(0.88); }
      to { filter: brightness(1.24); transform: skewX(-7deg) scaleX(1.08); }
    }

    @keyframes dangerPulse {
      from { opacity: 0.72; }
      to { opacity: 1; }
    }

    @keyframes coreReady {
      from { transform: scale(0.92); }
      to { transform: scale(1.12); }
    }

    @keyframes barrageFlash {
      0% { box-shadow: 4px 4px 0 var(--ink); }
      30% { box-shadow: 4px 4px 0 var(--ink), inset 0 0 34px rgba(255, 196, 71, 0.92); }
      100% { box-shadow: 4px 4px 0 var(--ink); }
