  <script>
    (() => {
      "use strict";

      const SIZE = 8;
      const TYPE_COUNT = 6;
      const MAX_MOVES = 24;
      const TARGET_SCORE = 14000;
      const KILL_SCORE = 150;
      const TYPE_NAMES = ["莓果糖", "橙子糖", "青柠糖", "汽水糖", "葡萄糖", "星星糖"];
      const SPECIAL_NAMES = { row: "横向炮", col: "纵向炮", bomb: "范围炸弹", rainbow: "彩虹核心" };
      const ATTACKS = [
        { name: "莓果炮", color: "#f15a50" },
        { name: "烈焰弹", color: "#ff963c" },
        { name: "针叶毒刺", color: "#45bd72" },
        { name: "冰晶箭", color: "#42bfe8" },
        { name: "连锁闪电", color: "#9b68dc" },
        { name: "星光重击", color: "#ffd44f" }
      ];
      const WAVES = [
        { threshold: 0, spawnInterval: 5.4, hpBonus: 0, speedScale: 1 },
        { threshold: 4500, spawnInterval: 4.6, hpBonus: 1, speedScale: 1.06 },
        { threshold: 9500, spawnInterval: 3.8, hpBonus: 2, speedScale: 1.12 }
      ];
      const ENEMY_TYPES = [
        { name: "普通僵尸", hp: 5, speed: 0.031, damage: 15, variant: 0, shield: 0 },
        { name: "迅捷僵尸", hp: 4, speed: 0.046, damage: 12, variant: 2, shield: 0 },
        { name: "护甲僵尸", hp: 7, speed: 0.024, damage: 21, variant: 1, shield: 3 }
      ];
      const ZOMBIE_MARKUP = '<i class="zombie-arm left"></i><i class="zombie-arm right"></i><i class="zombie-leg left"></i><i class="zombie-leg right"></i><i class="zombie-torso"></i><i class="zombie-head"><b class="zombie-eye left"></b><b class="zombie-eye right"></b><b class="zombie-jaw"></b></i>';
      const NUMBER = new Intl.NumberFormat("zh-CN");
      const wait = (ms) => new Promise((resolve) => window.setTimeout(resolve, ms));

      const appShell = document.querySelector(".app-shell");
      const mainMenu = document.getElementById("mainMenu");
      const startGameButton = document.getElementById("startGameButton");
      const menuHighScoreValue = document.getElementById("menuHighScoreValue");
      const boardElement = document.getElementById("board");
      const boardStage = document.getElementById("boardStage");
      const battleLane = document.getElementById("battleLane");
      const monsterLayer = document.getElementById("monsterLayer");
      const battleEffects = document.getElementById("battleEffects");
      const wallHpValue = document.getElementById("wallHpValue");
      const wallHpFill = document.getElementById("wallHpFill");
      const wallPowerCore = document.getElementById("wallPowerCore");
      const defeatedValue = document.getElementById("defeatedValue");
      const waveValue = document.getElementById("waveValue");
      const sidebarWaveValue = document.getElementById("sidebarWaveValue");
      const defenseChargeValue = document.getElementById("defenseChargeValue");
      const threatValue = document.getElementById("threatValue");
      const attackBanner = document.getElementById("attackBanner");
      const scoreValue = document.getElementById("scoreValue");
      const targetValue = document.getElementById("targetValue");
      const movesValue = document.getElementById("movesValue");
      const progressFill = document.getElementById("progressFill");
      const progressValue = document.getElementById("progressValue");
      const comboValue = document.getElementById("comboValue");
      const comboCaption = document.getElementById("comboCaption");
      const highScoreValue = document.getElementById("highScoreValue");
      const activityText = document.getElementById("activityText");
      const homeButton = document.getElementById("homeButton");
      const pauseButton = document.getElementById("pauseButton");
      const soundButton = document.getElementById("soundButton");
      const restartButton = document.getElementById("restartButton");
      const resultBackdrop = document.getElementById("resultBackdrop");
      const resultTitle = document.getElementById("resultTitle");
      const resultIcon = document.getElementById("resultIcon");
      const resultMessage = document.getElementById("resultMessage");
      const resultScore = document.getElementById("resultScore");
      const playAgainButton = document.getElementById("playAgainButton");
      const confettiLayer = document.getElementById("confettiLayer");
      const liveRegion = document.getElementById("liveRegion");

      let audioContext = null;
      let pointerStart = null;
      let suppressClick = false;

      const state = {
        board: [],
        specials: [],
        selected: null,
        score: 0,
        moves: MAX_MOVES,
        combo: 1,
        busy: false,
        ended: false,
        inMenu: true,
        paused: false,
        autoPaused: false,
        round: 0,
        monsters: [],
        nextMonsterId: 1,
        wallHp: 100,
        defenseCharge: 0,
        barrageActive: false,
        defeated: 0,
        wave: 0,
        feedbackId: 0,
        hintTimer: null,
        hintCells: [],
        battleTimer: null,
        battleLastTime: 0,
        spawnClock: 0,
        soundOn: true,
        highScore: readHighScore()
      };

      function setBoardBusy(busy) {
        state.busy = busy;
        boardElement.setAttribute("aria-busy", String(busy));
        battleLane.classList.toggle("resolving", busy);
      }

      function readHighScore() {
        try {
          return Number(localStorage.getItem("sweet-match-high-score")) || 0;
        } catch (_) {
          return 0;
        }
      }

      function saveHighScore() {
        if (state.score <= state.highScore) return;
        state.highScore = state.score;
        try {
          localStorage.setItem("sweet-match-high-score", String(state.highScore));
        } catch (_) {
          // The game remains playable when browser storage is unavailable.
        }
      }

      function randomType(excluded = []) {
        const choices = [];
        for (let type = 0; type < TYPE_COUNT; type += 1) {
          if (!excluded.includes(type)) choices.push(type);
        }
        return choices[Math.floor(Math.random() * choices.length)];
      }

      function createPlayableBoard() {
        let candidate;
        do {
          candidate = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
          for (let row = 0; row < SIZE; row += 1) {
            for (let col = 0; col < SIZE; col += 1) {
              const excluded = [];
              if (col >= 2 && candidate[row][col - 1] === candidate[row][col - 2]) {
                excluded.push(candidate[row][col - 1]);
              }
              if (row >= 2 && candidate[row - 1][col] === candidate[row - 2][col]) {
                excluded.push(candidate[row - 1][col]);
              }
              candidate[row][col] = randomType(excluded);
            }
          }
        } while (!hasPossibleMove(candidate));
        return candidate;
      }

      function positionKey(row, col) {
        return `${row}-${col}`;
      }

      function parseKey(key) {
        const [row, col] = key.split("-").map(Number);
        return { row, col };
      }

      function isAdjacent(a, b) {
        return Math.abs(a.row - b.row) + Math.abs(a.col - b.col) === 1;
      }

      function swap(board, a, b) {
        const value = board[a.row][a.col];
        board[a.row][a.col] = board[b.row][b.col];
        board[b.row][b.col] = value;
      }

      function findMatchGroups(board) {
        const groups = [];
        for (let row = 0; row < SIZE; row += 1) {
          let start = 0;
          for (let col = 1; col <= SIZE; col += 1) {
            if (col < SIZE && board[row][col] !== null && board[row][col] === board[row][start]) continue;
            if (board[row][start] !== null && col - start >= 3) {
              const group = new Set();
              for (let matchCol = start; matchCol < col; matchCol += 1) {
                group.add(positionKey(row, matchCol));
              }
              groups.push(group);
            }
            start = col;
          }
        }

        for (let col = 0; col < SIZE; col += 1) {
          let start = 0;
          for (let row = 1; row <= SIZE; row += 1) {
            if (row < SIZE && board[row][col] !== null && board[row][col] === board[start][col]) continue;
            if (board[start][col] !== null && row - start >= 3) {
              const group = new Set();
              for (let matchRow = start; matchRow < row; matchRow += 1) {
                group.add(positionKey(matchRow, col));
              }
              groups.push(group);
            }
            start = row;
          }
        }

        return groups;
      }

      function findMatches(board) {
        const matches = new Set();
        for (const group of findMatchGroups(board)) {
          for (const key of group) matches.add(key);
        }
        return matches;
      }

      function groupOrientation(group) {
        const positions = [...group].map(parseKey);
        return positions.every((position) => position.row === positions[0].row) ? "row" : "col";
      }

      function findSpecialCreations(groups) {
        const creations = new Map();
        const bombGroups = new Set();
        for (let first = 0; first < groups.length; first += 1) {
          for (let second = first + 1; second < groups.length; second += 1) {
            if (groupOrientation(groups[first]) === groupOrientation(groups[second])) continue;
            const intersection = [...groups[first]].find((key) => groups[second].has(key));
            if (!intersection) continue;
            const { row, col } = parseKey(intersection);
            if (!state.specials[row]?.[col]) creations.set(intersection, "bomb");
            bombGroups.add(first);
            bombGroups.add(second);
          }
        }

        groups.forEach((group, index) => {
          if (bombGroups.has(index) || group.size < 4) return;
          const kind = group.size >= 5 ? "rainbow" : groupOrientation(group);
          const candidates = [...group]
            .map((key) => ({ key, ...parseKey(key) }))
            .sort((a, b) => a.row - b.row || a.col - b.col);
          const available = candidates.filter(({ key, row, col }) => !creations.has(key) && !state.specials[row]?.[col]);
          const pool = available.length > 0 ? available : candidates;
          const chosen = pool[Math.floor(pool.length / 2)];
          if (chosen && !creations.has(chosen.key)) creations.set(chosen.key, kind);
        });
        return creations;
      }

      function specialTargets(kind, position, candyType) {
        const targets = [];
        if (kind === "row") {
          for (let col = 0; col < SIZE; col += 1) targets.push(positionKey(position.row, col));
        } else if (kind === "col") {
          for (let row = 0; row < SIZE; row += 1) targets.push(positionKey(row, position.col));
        } else if (kind === "bomb") {
          for (let row = Math.max(0, position.row - 1); row <= Math.min(SIZE - 1, position.row + 1); row += 1) {
            for (let col = Math.max(0, position.col - 1); col <= Math.min(SIZE - 1, position.col + 1); col += 1) {
              targets.push(positionKey(row, col));
            }
          }
        } else {
          for (let row = 0; row < SIZE; row += 1) {
            for (let col = 0; col < SIZE; col += 1) {
              if (state.board[row][col] === candyType) targets.push(positionKey(row, col));
            }
          }
        }
        return targets;
      }

      function expandSpecialMatches(baseMatches) {
        const expanded = new Set(baseMatches);
        const queue = [...expanded];
        const activated = [];
        const activatedKeys = new Set();
        while (queue.length > 0) {
          const key = queue.shift();
          if (activatedKeys.has(key)) continue;
          const position = parseKey(key);
          const kind = state.specials[position.row]?.[position.col];
          if (!kind) continue;
          activatedKeys.add(key);
          activated.push({ key, kind, type: state.board[position.row][position.col] });
          for (const targetKey of specialTargets(kind, position, state.board[position.row][position.col])) {
            const target = parseKey(targetKey);
            if (state.board[target.row][target.col] === null || expanded.has(targetKey)) continue;
            expanded.add(targetKey);
            queue.push(targetKey);
          }
        }
        return { matches: expanded, activated };
      }

      function hasPossibleMove(board) {
        for (let row = 0; row < SIZE; row += 1) {
          for (let col = 0; col < SIZE; col += 1) {
            const here = { row, col };
            const neighbors = [];
            if (col + 1 < SIZE) neighbors.push({ row, col: col + 1 });
            if (row + 1 < SIZE) neighbors.push({ row: row + 1, col });
            for (const neighbor of neighbors) {
              swap(board, here, neighbor);
              const valid = findMatches(board).size > 0;
              swap(board, here, neighbor);
              if (valid) return true;
            }
          }
        }
        return false;
      }

      function countPossibleMoves(board) {
        let count = 0;
        for (let row = 0; row < SIZE; row += 1) {
          for (let col = 0; col < SIZE; col += 1) {
            const here = { row, col };
            const neighbors = [];
            if (col + 1 < SIZE) neighbors.push({ row, col: col + 1 });
            if (row + 1 < SIZE) neighbors.push({ row: row + 1, col });
            for (const neighbor of neighbors) {
              swap(board, here, neighbor);
              if (findMatches(board).size > 0) count += 1;
              swap(board, here, neighbor);
            }
          }
        }
        return count;
      }

      function findPossibleMove(board) {
        for (let row = 0; row < SIZE; row += 1) {
          for (let col = 0; col < SIZE; col += 1) {
            const here = { row, col };
            const neighbors = [];
            if (col + 1 < SIZE) neighbors.push({ row, col: col + 1 });
            if (row + 1 < SIZE) neighbors.push({ row: row + 1, col });
            for (const neighbor of neighbors) {
              swap(board, here, neighbor);
              const valid = findMatches(board).size > 0;
              swap(board, here, neighbor);
              if (valid) return [here, neighbor];
            }
          }
        }
        return null;
      }

      function clearHint() {
        if (state.hintTimer !== null) window.clearTimeout(state.hintTimer);
        state.hintTimer = null;
        state.hintCells = [];
        for (const tile of boardElement.querySelectorAll(".tile.hint")) tile.classList.remove("hint");
      }

      function scheduleHint() {
        clearHint();
        const round = state.round;
        state.hintTimer = window.setTimeout(() => {
          state.hintTimer = null;
          if (round !== state.round || state.busy || state.ended || state.paused || state.selected) return;
          const move = findPossibleMove(state.board);
          if (!move) return;
          state.hintCells = move;
          for (const position of move) getTile(position)?.classList.add("hint");
        }, 4500);
      }

      function waveIndexForScore(score) {
        let index = 0;
        for (let wave = 1; wave < WAVES.length; wave += 1) {
          if (score >= WAVES[wave].threshold) index = wave;
        }
        return index;
      }

      function chooseEnemyKind(wave) {
        const weights = [
          [0.78, 0.22, 0],
          [0.48, 0.34, 0.18],
          [0.34, 0.34, 0.32]
        ][wave];
        const roll = Math.random();
        if (roll < weights[0]) return 0;
        if (roll < weights[0] + weights[1]) return 1;
        return 2;
      }

      function showWaveCallout() {
        const callout = document.createElement("strong");
        callout.className = "wave-callout";
        callout.textContent = state.wave === WAVES.length - 1 ? "最终波" : `第 ${state.wave + 1} 波`;
        battleEffects.appendChild(callout);
        callout.addEventListener("animationend", () => callout.remove(), { once: true });
      }

      function updateWave() {
        const nextWave = waveIndexForScore(state.score);
        if (nextWave <= state.wave) return;
        state.wave = nextWave;
        state.spawnClock = Math.max(state.spawnClock, WAVES[state.wave].spawnInterval - 1.2);
        showWaveCallout();
        setActivity(state.wave === WAVES.length - 1 ? "最终波来袭！" : `第 ${state.wave + 1} 波来袭！`);
        playTone("chain");
        renderBattle();
      }

      function showAttackFeedback(type, power) {
        state.feedbackId += 1;
        const feedbackId = state.feedbackId;
        attackBanner.textContent = power > 0 ? `${ATTACKS[type].name} · 强化 +${power}` : ATTACKS[type].name;
        attackBanner.style.setProperty("--attack-color", ATTACKS[type].color);
        attackBanner.classList.remove("show");
        attackBanner.getBoundingClientRect();
        attackBanner.classList.add("show");

        const icons = document.querySelectorAll("[data-attack-type]");
        for (const icon of icons) icon.classList.toggle("active", Number(icon.dataset.attackType) === type);
        window.setTimeout(() => {
          if (feedbackId !== state.feedbackId) return;
          attackBanner.classList.remove("show");
          for (const icon of icons) icon.classList.remove("active");
        }, 820);
      }

      function renderBattle() {
        const now = performance.now();
        const nearestMonsterX = state.monsters.length > 0
          ? Math.min(...state.monsters.map((monster) => monster.x))
          : 1;
        const threat = nearestMonsterX <= 0.25
          ? { label: "危险", className: "status-critical" }
          : nearestMonsterX <= 0.48
            ? { label: "接近", className: "status-near" }
            : { label: "安全", className: "status-safe" };
        wallHpValue.textContent = String(Math.max(0, Math.ceil(state.wallHp)));
        wallHpFill.style.width = `${Math.max(0, state.wallHp)}%`;
        wallPowerCore.style.setProperty("--charge", String(state.defenseCharge));
        defenseChargeValue.textContent = `${Math.round(state.defenseCharge)}%`;
        threatValue.textContent = threat.label;
        threatValue.className = threat.className;
        defeatedValue.textContent = String(state.defeated);
        waveValue.textContent = String(state.wave + 1);
        sidebarWaveValue.textContent = `${state.wave + 1} / ${WAVES.length}`;
        battleLane.classList.toggle("wall-danger", state.wallHp <= 35);
        battleLane.classList.toggle("danger-near", nearestMonsterX <= 0.48);
        battleLane.classList.toggle("danger-critical", nearestMonsterX <= 0.25);
        battleLane.classList.toggle("power-ready", state.defenseCharge >= 100 || state.barrageActive);

        const existing = new Map(
          [...monsterLayer.querySelectorAll(".monster")].map((enemy) => [enemy.dataset.monsterId, enemy])
        );
        for (const monster of state.monsters) {
          const key = String(monster.id);
          let enemy = existing.get(key);
          if (!enemy) {
            enemy = document.createElement("div");
            enemy.dataset.monsterId = key;
            enemy.setAttribute("role", "img");

            const health = document.createElement("span");
            health.className = "monster-health";
            health.appendChild(document.createElement("i"));

            const body = document.createElement("span");
            body.className = "zombie-figure";
            body.innerHTML = ZOMBIE_MARKUP;

            const shield = document.createElement("span");
            shield.className = "monster-shield";

            const poisonAura = document.createElement("span");
            poisonAura.className = "status-aura poison-aura";
            poisonAura.innerHTML = "<i></i><i></i><i></i>";

            const iceAura = document.createElement("span");
            iceAura.className = "status-aura ice-aura";

            const stunAura = document.createElement("span");
            stunAura.className = "status-aura stun-aura";
            stunAura.innerHTML = "<i></i><i></i><i></i>";

            enemy.append(health, body, shield, poisonAura, iceAura, stunAura);
            monsterLayer.appendChild(enemy);
          }
          existing.delete(key);

          const frozen = monster.freezeUntil > now;
          const poisoned = monster.poisonUntil > now;
          const burning = monster.burnUntil > now;
          const stunned = monster.stunUntil > now;
          const knocked = monster.knockUntil > now;
          const shieldHit = monster.shieldHitUntil > now;
          const hit = monster.hitUntil > now;
          enemy.className = `monster variant-${monster.variant} enemy-kind-${monster.kind}${frozen ? " frozen" : ""}${poisoned ? " poisoned" : ""}${burning ? " burning" : ""}${stunned ? " stunned" : ""}${knocked ? " knocked" : ""}${shieldHit ? " shield-hit" : ""}${hit ? " hit" : ""}`;
          enemy.style.left = `${monster.x * 100}%`;
          enemy.setAttribute("aria-label", `${monster.name}，生命 ${Math.max(0, monster.hp)}/${monster.maxHp}${monster.shield > 0 ? `，护甲 ${monster.shield}` : ""}`);
          enemy.querySelector(".monster-health i").style.width = `${Math.max(0, (monster.hp / monster.maxHp) * 100)}%`;
          enemy.querySelector(".monster-shield").hidden = monster.shield <= 0;
          enemy.querySelector(".poison-aura").hidden = !poisoned;
          enemy.querySelector(".ice-aura").hidden = !frozen;
          enemy.querySelector(".stun-aura").hidden = !stunned;
        }
        for (const enemy of existing.values()) enemy.remove();
      }

      function stopBattle() {
        if (state.battleTimer !== null) {
          window.clearInterval(state.battleTimer);
          state.battleTimer = null;
        }
      }

      function spawnMonster(round, announce = false) {
        if (round !== state.round || state.ended || state.monsters.length >= 4) return null;
        const wave = WAVES[state.wave];
        const kind = chooseEnemyKind(state.wave);
        const enemyType = ENEMY_TYPES[kind];
        const extraHealth = Math.min(3, Math.floor(state.defeated / 8));
        const maxHp = enemyType.hp + wave.hpBonus + extraHealth;
        const maxShield = enemyType.shield + (kind === 2 && state.wave === 2 ? 1 : 0);
        const monster = {
          id: state.nextMonsterId,
          kind,
          name: enemyType.name,
          variant: enemyType.variant,
          x: 0.96,
          hp: maxHp,
          maxHp,
          shield: maxShield,
          maxShield,
          speed: enemyType.speed * wave.speedScale * (0.94 + Math.random() * 0.12),
          damage: enemyType.damage + state.wave * 2,
          freezeUntil: 0,
          poisonUntil: 0,
          nextPoisonAt: 0,
          burnUntil: 0,
          stunUntil: 0,
          knockUntil: 0,
          shieldHitUntil: 0,
          hitUntil: 0
        };
        state.nextMonsterId += 1;
        state.monsters.push(monster);
        renderBattle();
        if (announce) setActivity(`${enemyType.name}进入战线`);
        return monster;
      }

      function emitParticles(x, type, count = 9, top = "62%") {
        const palettes = [
          ["#f15a50", "#ff9b8f", "#c83d39"],
          ["#ff5b31", "#ff963c", "#ffd45a"],
          ["#45bd72", "#a7dc61", "#2f8e5b"],
          ["#b9efff", "#42bfe8", "#247fa7"],
          ["#d6a7ff", "#9b68dc", "#7042b5"],
          ["#fff0a0", "#ffd44f", "#f2a934"]
        ];
        for (let index = 0; index < count; index += 1) {
          const particle = document.createElement("i");
          particle.className = `impact-particle particle-${type}`;
          particle.style.left = `${x * 100}%`;
          particle.style.top = top;
          particle.style.setProperty("--particle-x", `${-50 + Math.random() * 100}px`);
          particle.style.setProperty("--particle-y", `${-58 + Math.random() * 70}px`);
          particle.style.setProperty("--particle-spin", `${-240 + Math.random() * 480}deg`);
          particle.style.setProperty("--particle-color", palettes[type][index % palettes[type].length]);
          particle.style.animationDelay = `${Math.random() * 90}ms`;
          battleEffects.appendChild(particle);
          particle.addEventListener("animationend", () => particle.remove(), { once: true });
        }
      }

      function showDeathEffect(monster, attackType) {
        const effect = document.createElement("div");
        effect.className = `death-effect death-${attackType}`;
        effect.style.left = `${monster.x * 100}%`;

        if (attackType === 4) {
          const skeleton = document.createElement("span");
          skeleton.className = "electric-skeleton";
          skeleton.innerHTML = '<i class="skeleton-skull"><b></b><b></b></i><i class="skeleton-spine"></i><i class="skeleton-ribs"></i><i class="skeleton-arm left"></i><i class="skeleton-arm right"></i><i class="skeleton-leg left"></i><i class="skeleton-leg right"></i>';
          effect.appendChild(skeleton);
          for (let index = 0; index < 3; index += 1) {
            const arc = document.createElement("i");
            arc.className = "death-electric-arc";
            arc.style.setProperty("--arc-rotation", `${-28 + index * 29}deg`);
            arc.style.animationDelay = `${index * 70}ms`;
            effect.appendChild(arc);
          }
        } else {
          const body = document.createElement("span");
          body.className = "zombie-figure death-zombie";
          body.innerHTML = ZOMBIE_MARKUP;
          effect.appendChild(body);
        }

        if (attackType === 1) {
          const flame = document.createElement("i");
          flame.className = "death-flame";
          effect.appendChild(flame);
          for (let index = 0; index < 10; index += 1) {
            const ash = document.createElement("i");
            ash.className = "ash-speck";
            ash.style.setProperty("--ash-x", `${-34 + Math.random() * 68}px`);
            ash.style.setProperty("--ash-y", `${-52 + Math.random() * 25}px`);
            ash.style.animationDelay = `${250 + Math.random() * 380}ms`;
            effect.appendChild(ash);
          }
        } else if (attackType === 2) {
          const puddle = document.createElement("i");
          puddle.className = "poison-puddle";
          effect.appendChild(puddle);
        } else if (attackType === 3) {
          const shell = document.createElement("i");
          shell.className = "death-ice-shell";
          effect.appendChild(shell);
        }

        battleEffects.appendChild(effect);
        emitParticles(monster.x, attackType, attackType === 5 ? 16 : 11, "61%");
        window.setTimeout(() => effect.remove(), 1450);
      }

      function showBattleScore(x, points) {
        const label = document.createElement("strong");
        label.className = "battle-score";
        label.style.left = `${x * 100}%`;
        label.textContent = `+${NUMBER.format(points)}`;
        battleEffects.appendChild(label);
        label.addEventListener("animationend", () => label.remove(), { once: true });
      }

      function damageMonster(id, amount, attackType, announce = false) {
        const monster = state.monsters.find((item) => item.id === id);
        if (!monster || state.ended) return false;
        let healthDamage = amount;
        let absorbed = 0;
        if (monster.shield > 0) {
          absorbed = Math.min(monster.shield, healthDamage);
          monster.shield -= absorbed;
          healthDamage -= absorbed;
          monster.shieldHitUntil = performance.now() + 340;
        }
        monster.hp -= healthDamage;
        monster.hitUntil = performance.now() + 240;
        if (attackType === 1) monster.burnUntil = performance.now() + 620;
        if (monster.hp <= 0) {
          showDeathEffect(monster, attackType);
          state.monsters = state.monsters.filter((item) => item.id !== id);
          state.defeated += 1;
          const killScore = KILL_SCORE + state.wave * 50 + monster.maxShield * 15;
          state.score += killScore;
          showBattleScore(monster.x, killScore);
          updateWave();
          saveHighScore();
          renderStats();
          setActivity(`${ATTACKS[attackType].name}击退僵尸，奖励 ${killScore} 分`);
          playTone("chain");
          renderBattle();
          return true;
        }
        if (announce) {
          setActivity(absorbed > 0 && healthDamage === 0
            ? `护甲吸收了 ${absorbed} 点伤害`
            : `${ATTACKS[attackType].name}造成 ${healthDamage} 点伤害${absorbed > 0 ? `，破甲 ${absorbed}` : ""}`);
        }
        renderBattle();
        return false;
      }

      function dominantMatchType(matches) {
        const counts = Array(TYPE_COUNT).fill(0);
        for (const key of matches) {
          const { row, col } = parseKey(key);
          counts[state.board[row][col]] += 1;
        }
        let type = 0;
        for (let index = 1; index < counts.length; index += 1) {
          if (counts[index] > counts[type]) type = index;
        }
        return type;
      }

      function showImpact(x, type, power = 0) {
        const impact = document.createElement("i");
        impact.className = `attack-impact impact-${type}${power > 0 ? " charged-impact" : ""}`;
        impact.style.left = `${x * 100}%`;
        impact.style.setProperty("--impact-color", ATTACKS[type].color);
        battleEffects.appendChild(impact);
        impact.addEventListener("animationend", () => impact.remove(), { once: true });
        emitParticles(x, type, (type === 1 ? 13 : 9) + power * 3);
      }

      function showLightningChain(monsters) {
        const ordered = [...monsters].sort((a, b) => a.x - b.x);
        for (let index = 0; index < ordered.length - 1; index += 1) {
          const from = ordered[index].x;
          const to = ordered[index + 1].x;
          const link = document.createElement("i");
          link.className = "lightning-link";
          link.style.left = `${from * 100}%`;
          link.style.width = `${Math.max(0.04, to - from) * 100}%`;
          link.style.animationDelay = `${index * 80}ms`;
          battleEffects.appendChild(link);
          link.addEventListener("animationend", () => link.remove(), { once: true });
        }
      }

      function gainDefenseCharge(matches, chain, groupCount) {
        const gain = Math.min(30, matches.size * 2 + groupCount * 3 + Math.max(0, chain - 1) * 6);
        state.defenseCharge = Math.min(100, state.defenseCharge + gain);
        renderBattle();
        return state.defenseCharge >= 100;
      }

      async function triggerDefenseBarrage(round) {
        if (round !== state.round || state.ended || state.barrageActive || state.defenseCharge < 100) return;
        state.barrageActive = true;
        state.defenseCharge = 0;
        battleLane.classList.remove("barrage");
        battleLane.getBoundingClientRect();
        battleLane.classList.add("barrage");
        renderBattle();
        setActivity("防线火力全开，六重齐射！");
        playTone("chain");
        const salvoMatches = new Set(["0-0", "0-1", "0-2"]);
        try {
          await Promise.all(ATTACKS.map((_, type) => (
            performAttack(type, salvoMatches, 1, round, type * 90)
          )));
        } finally {
          state.barrageActive = false;
          battleLane.classList.remove("barrage");
          renderBattle();
        }
      }

      async function performAttack(type, matches, chain, round, delay = 0) {
        if (delay > 0) await wait(delay);
        if (round !== state.round || state.ended) return;
        if (state.monsters.length === 0) spawnMonster(round);
        const target = [...state.monsters].sort((a, b) => a.x - b.x)[0];
        if (!target) return;

        const power = Math.min(3, Math.max(0, matches.size - 3) + Math.max(0, chain - 1));
        const shot = document.createElement("i");
        shot.className = `attack-shot attack-${type}${power > 0 ? " charged" : ""}`;
        battleEffects.appendChild(shot);
        showAttackFeedback(type, power);
        setActivity(`${ATTACKS[type].name}${power > 0 ? `强化 +${power}` : ""}发射！`);
        playTone("attack");
        const destination = `${target.x * 100}%`;
        if (typeof shot.animate === "function") {
          const flight = shot.animate(
            [{ left: "12%" }, { left: destination }],
            { duration: 620, easing: "cubic-bezier(.18,.72,.28,1)", fill: "forwards" }
          );
          await flight.finished.catch(() => {});
        } else {
          shot.style.transition = "left 620ms cubic-bezier(.18,.72,.28,1)";
          shot.getBoundingClientRect();
          shot.style.left = destination;
          await wait(640);
        }
        shot.remove();
        if (round !== state.round || state.ended) return;

        let currentTarget = state.monsters.find((item) => item.id === target.id);
        if (!currentTarget) currentTarget = [...state.monsters].sort((a, b) => a.x - b.x)[0];
        if (!currentTarget) {
          showImpact(target.x, type, power);
          return;
        }
        if (type !== 4) showImpact(currentTarget.x, type, power);
        const nearby = state.monsters.filter((item) => item.id !== currentTarget.id && Math.abs(item.x - currentTarget.x) <= 0.2);

        if (type === 0) {
          const defeated = damageMonster(currentTarget.id, 3 + power, type, true);
          if (!defeated) {
            const knocked = state.monsters.find((item) => item.id === currentTarget.id);
            if (knocked) {
              knocked.x = Math.min(0.96, knocked.x + 0.065 + power * 0.012);
              knocked.knockUntil = performance.now() + 340;
            }
          }
        } else if (type === 1) {
          damageMonster(currentTarget.id, 2 + power, type, true);
          for (const monster of nearby) damageMonster(monster.id, 1, type);
        } else if (type === 2) {
          damageMonster(currentTarget.id, 1 + power, type, true);
          const poisoned = state.monsters.find((item) => item.id === currentTarget.id);
          if (poisoned) {
            poisoned.poisonUntil = performance.now() + 3200;
            poisoned.nextPoisonAt = performance.now() + 900;
          }
        } else if (type === 3) {
          damageMonster(currentTarget.id, 2 + power, type, true);
          const frozen = state.monsters.find((item) => item.id === currentTarget.id);
          if (frozen) frozen.freezeUntil = performance.now() + 4200;
        } else if (type === 4) {
          const chainTargets = [...state.monsters];
          showLightningChain(chainTargets);
          for (const monster of chainTargets) {
            showImpact(monster.x, type, power);
            damageMonster(monster.id, 2 + Math.min(1, power), type);
          }
          if (state.monsters.some((item) => item.id === currentTarget.id)) {
            setActivity(`${ATTACKS[type].name}横扫整条道路`);
          }
        } else {
          const defeated = damageMonster(currentTarget.id, 4 + power, type, true);
          if (!defeated) {
            const stunned = state.monsters.find((item) => item.id === currentTarget.id);
            if (stunned) stunned.stunUntil = performance.now() + 2200;
          }
          state.wallHp = Math.min(100, state.wallHp + 5 + power);
        }
        renderBattle();
        await wait(90);
      }

      function battleTick(round) {
        if (round !== state.round || state.ended) {
          stopBattle();
          return;
        }
        const now = performance.now();
        if (state.paused) {
          state.battleLastTime = now;
          return;
        }
        const elapsed = Math.min(0.25, Math.max(0, (now - state.battleLastTime) / 1000));
        state.battleLastTime = now;
        const resolutionScale = state.busy ? 0.35 : 1;
        state.spawnClock += elapsed * (state.busy ? 0.5 : 1);
        const spawnInterval = Math.max(3.2, WAVES[state.wave].spawnInterval - state.defeated * 0.015);
        if (state.spawnClock >= spawnInterval && state.monsters.length < 4) {
          state.spawnClock = 0;
          spawnMonster(round, true);
        }

        let wallDamage = 0;
        for (const snapshot of [...state.monsters]) {
          let monster = state.monsters.find((item) => item.id === snapshot.id);
          if (!monster) continue;
          if (monster.poisonUntil > now && monster.nextPoisonAt <= now) {
            monster.nextPoisonAt = now + 900;
            damageMonster(monster.id, 1, 2);
            monster = state.monsters.find((item) => item.id === snapshot.id);
            if (!monster) continue;
          }
          const speedScale = monster.stunUntil > now ? 0 : monster.freezeUntil > now ? 0.26 : 1;
          monster.x -= monster.speed * elapsed * speedScale * resolutionScale;
          if (monster.x <= 0.14) wallDamage += monster.damage;
        }

        if (wallDamage > 0) {
          state.monsters = state.monsters.filter((monster) => monster.x > 0.14);
          state.wallHp = Math.max(0, state.wallHp - wallDamage);
          battleLane.classList.remove("wall-hit");
          battleLane.getBoundingClientRect();
          battleLane.classList.add("wall-hit");
          window.setTimeout(() => battleLane.classList.remove("wall-hit"), 300);
          setActivity(`僵尸撞击城墙，损失 ${wallDamage} 点耐久`);
          playTone("error");
        }
        renderBattle();
        if (state.wallHp <= 0) endGame(false, "wall");
      }

      function updatePauseButton() {
        pauseButton.textContent = state.paused ? "▶" : "Ⅱ";
        const label = state.paused ? "继续游戏" : "暂停游戏";
        pauseButton.setAttribute("aria-label", label);
        pauseButton.title = label;
        document.body.classList.toggle("game-paused", state.paused);
      }

      function resumeBattle(round) {
        if (round !== state.round || state.ended || state.paused || state.battleTimer !== null) return;
        state.battleLastTime = performance.now();
        state.battleTimer = window.setInterval(() => battleTick(round), 100);
      }

      function setPaused(paused, automatic = false) {
        if (state.ended || state.inMenu || state.paused === paused) return;
        state.paused = paused;
        state.autoPaused = paused && automatic;
        if (paused) {
          clearHint();
          stopBattle();
          setActivity(automatic ? "页面已转入后台，战斗自动暂停" : "战斗已暂停");
        } else {
          state.autoPaused = false;
          resumeBattle(state.round);
          scheduleHint();
          setActivity("战斗继续");
        }
        updatePauseButton();
      }

      function startBattle(round) {
        stopBattle();
        state.battleLastTime = performance.now();
        state.spawnClock = 0;
        spawnMonster(round);
        resumeBattle(round);
      }

      function renderBoard(freshCells = new Set()) {
        const fragment = document.createDocumentFragment();
        for (let row = 0; row < SIZE; row += 1) {
          for (let col = 0; col < SIZE; col += 1) {
            const type = state.board[row][col];
            const special = state.specials[row]?.[col] || null;
            const tile = document.createElement("button");
            tile.type = "button";
            tile.className = "tile";
            tile.dataset.row = row;
            tile.dataset.col = col;
            tile.setAttribute("role", "gridcell");
            tile.setAttribute("aria-label", `第${row + 1}行第${col + 1}列，${TYPE_NAMES[type]}${special ? `，${SPECIAL_NAMES[special]}` : ""}`);
            tile.style.setProperty("--cell-index", String(row * SIZE + col));
            if (special) tile.classList.add("special-tile");

            if (state.selected && state.selected.row === row && state.selected.col === col) {
              tile.classList.add("selected");
              tile.setAttribute("aria-pressed", "true");
            }
            if (state.hintCells.some((position) => position.row === row && position.col === col)) tile.classList.add("hint");
            if (freshCells.has(positionKey(row, col))) tile.classList.add("fresh");

            const piece = document.createElement("span");
            piece.className = "piece";
            const candy = document.createElement("span");
            candy.className = `candy type-${type}${special ? ` special-candy special-${special}` : ""}`;
            piece.appendChild(candy);
            tile.appendChild(piece);
            fragment.appendChild(tile);
          }
        }
        boardElement.replaceChildren(fragment);
      }

      function renderStats() {
        const progress = Math.min(100, Math.round((state.score / TARGET_SCORE) * 100));
        scoreValue.textContent = NUMBER.format(state.score);
        movesValue.textContent = String(state.moves);
        targetValue.textContent = NUMBER.format(TARGET_SCORE);
        progressFill.style.width = `${progress}%`;
        progressValue.textContent = `${progress}%`;
        comboValue.textContent = `x${state.combo}`;
        comboCaption.textContent = state.combo > 1 ? `${state.combo} 连消` : "基础倍率";
        highScoreValue.textContent = NUMBER.format(Math.max(state.highScore, state.score));
      }

      function setActivity(message, announce = true) {
        activityText.textContent = message;
        if (announce) liveRegion.textContent = message;
      }

      function getTile(position) {
        return boardElement.querySelector(`[data-row="${position.row}"][data-col="${position.col}"]`);
      }

      async function animateSwap(a, b) {
        const tileA = getTile(a);
        const tileB = getTile(b);
        if (!tileA || !tileB) return;
        const pieceA = tileA.querySelector(".piece");
        const pieceB = tileB.querySelector(".piece");
        const rectA = tileA.getBoundingClientRect();
        const rectB = tileB.getBoundingClientRect();
        const deltaX = rectB.left - rectA.left;
        const deltaY = rectB.top - rectA.top;
        const options = { duration: 180, easing: "cubic-bezier(.25,.8,.35,1)", fill: "forwards" };
        const animations = [
          pieceA.animate([{ transform: "translate(0, 0)" }, { transform: `translate(${deltaX}px, ${deltaY}px)` }], options),
          pieceB.animate([{ transform: "translate(0, 0)" }, { transform: `translate(${-deltaX}px, ${-deltaY}px)` }], options)
        ];
        await Promise.all(animations.map((animation) => animation.finished.catch(() => {})));
      }

      function playTone(kind) {
        if (!state.soundOn) return;
        try {
          audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
          if (audioContext.state === "suspended") audioContext.resume();
          const oscillator = audioContext.createOscillator();
          const gain = audioContext.createGain();
          const now = audioContext.currentTime;
          const frequencies = { select: 360, clear: 580, chain: 760, attack: 690, error: 150, win: 920 };
          oscillator.type = kind === "error" ? "square" : "sine";
          oscillator.frequency.setValueAtTime(frequencies[kind] || 440, now);
          if (kind === "win") oscillator.frequency.exponentialRampToValueAtTime(1380, now + 0.22);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.12, now + 0.018);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + (kind === "win" ? 0.34 : 0.12));
          oscillator.connect(gain).connect(audioContext.destination);
          oscillator.start(now);
          oscillator.stop(now + (kind === "win" ? 0.35 : 0.13));
        } catch (_) {
          state.soundOn = false;
          updateSoundButton();
        }
      }

      function updateSoundButton() {
        soundButton.textContent = state.soundOn ? "♪" : "×";
        const label = state.soundOn ? "关闭音效" : "开启音效";
        soundButton.setAttribute("aria-label", label);
        soundButton.title = label;
      }

      function showFloatingScore(matches, points) {
        const positions = [...matches].map(parseKey);
        const centerRow = positions.reduce((sum, item) => sum + item.row, 0) / positions.length;
        const centerCol = positions.reduce((sum, item) => sum + item.col, 0) / positions.length;
        const label = document.createElement("span");
        label.className = "float-score";
        label.textContent = `+${NUMBER.format(points)}`;
        label.style.left = `${((centerCol + 0.5) / SIZE) * 100}%`;
        label.style.top = `${((centerRow + 0.5) / SIZE) * 100}%`;
        boardStage.appendChild(label);
        label.addEventListener("animationend", () => label.remove(), { once: true });
      }

      async function clearMatches(matches, chain, round) {
        const matchGroups = findMatchGroups(state.board);
        const specialCreations = findSpecialCreations(matchGroups);
        const expanded = expandSpecialMatches(matches);
        const scoringMatches = expanded.matches;
        const clearedMatches = new Set(scoringMatches);
        for (const key of specialCreations.keys()) clearedMatches.delete(key);
        const points = scoringMatches.size * 100 * chain + specialCreations.size * 200;
        state.score += points;
        state.combo = chain;
        updateWave();
        saveHighScore();
        renderStats();
        showFloatingScore(scoringMatches, points);
        for (const key of clearedMatches) {
          const position = parseKey(key);
          getTile(position)?.classList.add("clearing");
        }
        for (const { key } of expanded.activated) getTile(parseKey(key))?.classList.add("special-triggered");
        for (const key of specialCreations.keys()) getTile(parseKey(key))?.classList.add("special-forming");

        const groupAttacks = matchGroups.map((group, index) => (
          performAttack(dominantMatchType(group), group, chain, round, index * 120)
        ));
        const specialAttacks = expanded.activated.map((special, index) => {
          const size = special.kind === "rainbow" ? 6 : special.kind === "bomb" ? 5 : 4;
          const attackMatches = new Set(Array.from({ length: size }, (_, keyIndex) => `special-${index}-${keyIndex}`));
          return performAttack(special.type, attackMatches, chain + 1, round, matchGroups.length * 120 + index * 100);
        });
        const barrageReady = gainDefenseCharge(scoringMatches, chain, matchGroups.length + expanded.activated.length);
        playTone(chain > 1 ? "chain" : "clear");
        await Promise.all([wait(320), ...groupAttacks, ...specialAttacks]);
        if (round !== state.round) return false;
        if (barrageReady) {
          await triggerDefenseBarrage(round);
          if (round !== state.round) return false;
        }
        for (const key of clearedMatches) {
          const { row, col } = parseKey(key);
          state.board[row][col] = null;
          state.specials[row][col] = null;
        }
        for (const [key, kind] of specialCreations) {
          const { row, col } = parseKey(key);
          state.specials[row][col] = kind;
        }
        return true;
      }

      function collapseAndFill() {
        const fresh = new Set();
        for (let col = 0; col < SIZE; col += 1) {
          const remaining = [];
          for (let row = SIZE - 1; row >= 0; row -= 1) {
            if (state.board[row][col] !== null) {
              remaining.push({ type: state.board[row][col], special: state.specials[row][col] });
            }
          }
          let index = 0;
          for (let row = SIZE - 1; row >= 0; row -= 1) {
            if (index < remaining.length) {
              state.board[row][col] = remaining[index].type;
              state.specials[row][col] = remaining[index].special;
              index += 1;
            } else {
              state.board[row][col] = randomType();
              state.specials[row][col] = null;
              fresh.add(positionKey(row, col));
            }
          }
        }
        return fresh;
      }

      async function resolveBoard(round) {
        let chain = 1;
        let matches = findMatches(state.board);
        while (matches.size > 0) {
          const cleared = await clearMatches(matches, chain, round);
          if (!cleared || round !== state.round) return false;
          const fresh = collapseAndFill();
          renderBoard(fresh);
          await wait(280);
          if (round !== state.round) return false;
          chain += 1;
          matches = findMatches(state.board);
        }
        state.combo = Math.max(1, chain - 1);
        renderStats();
        return true;
      }

      async function attemptSwap(a, b) {
        if (state.busy || state.ended || state.paused || !isAdjacent(a, b)) return;
        clearHint();
        const round = state.round;
        setBoardBusy(true);
        state.selected = null;
        await animateSwap(a, b);
        if (round !== state.round) return;
        swap(state.board, a, b);
        swap(state.specials, a, b);
        renderBoard();

        if (findMatches(state.board).size === 0) {
          boardElement.classList.add("invalid");
          setActivity("这一步没有形成连消");
          playTone("error");
          await wait(150);
          if (round !== state.round) return;
          await animateSwap(a, b);
          if (round !== state.round) return;
          swap(state.board, a, b);
          swap(state.specials, a, b);
          renderBoard();
          boardElement.classList.remove("invalid");
          setBoardBusy(false);
          scheduleHint();
          return;
        }

        state.moves -= 1;
        renderStats();
        const resolved = await resolveBoard(round);
        if (!resolved || round !== state.round) return;

        if (state.score >= TARGET_SCORE) {
          setBoardBusy(false);
          endGame(true);
          return;
        }

        if (state.moves <= 0) {
          setBoardBusy(false);
          endGame(false);
          return;
        }

        if (!hasPossibleMove(state.board)) {
          const shuffled = await shuffleBoard(round);
          if (!shuffled || round !== state.round) return;
        } else {
          const options = countPossibleMoves(state.board);
          setActivity(`棋盘稳定，还有 ${options} 种有效移动`);
        }
        setBoardBusy(false);
        scheduleHint();
      }

      async function shuffleBoard(round) {
        setActivity("棋盘重排中…");
        boardElement.classList.add("shuffling");
        await wait(220);
        if (round !== state.round || state.ended) return false;
        state.board = createPlayableBoard();
        renderBoard();
        await wait(230);
        if (round !== state.round || state.ended) return false;
        boardElement.classList.remove("shuffling");
        setActivity("已找到新的消除机会");
        return true;
      }

      function selectTile(position) {
        if (state.busy || state.ended || state.paused) return;
        clearHint();
        if (!state.selected) {
          state.selected = position;
          renderBoard();
          getTile(position)?.focus({ preventScroll: true });
          playTone("select");
          return;
        }
        if (state.selected.row === position.row && state.selected.col === position.col) {
          state.selected = null;
          renderBoard();
          scheduleHint();
          return;
        }
        if (isAdjacent(state.selected, position)) {
          const first = state.selected;
          attemptSwap(first, position);
          return;
        }
        state.selected = position;
        renderBoard();
        getTile(position)?.focus({ preventScroll: true });
        playTone("select");
      }

      function tileFromEventTarget(target) {
        const tile = target.closest(".tile");
        if (!tile || !boardElement.contains(tile)) return null;
        return { row: Number(tile.dataset.row), col: Number(tile.dataset.col) };
      }

      function endGame(won, reason = "moves") {
        if (state.ended) return;
        state.ended = true;
        clearHint();
        state.paused = false;
        state.autoPaused = false;
        stopBattle();
        state.round += 1;
        saveHighScore();
        renderStats();
        resultTitle.textContent = won ? "城墙守住了！" : reason === "wall" ? "城墙失守" : "弹药耗尽";
        resultIcon.textContent = won ? "★" : reason === "wall" ? "▦" : "↻";
        resultMessage.textContent = won ? `击退 ${state.defeated} 只僵尸，本局得分` : reason === "wall" ? "僵尸突破防线，本局得分" : "步数用完，本局得分";
        resultScore.textContent = `${NUMBER.format(state.score)} 分`;
        resultBackdrop.classList.add("open");
        resultBackdrop.setAttribute("aria-hidden", "false");
        playTone(won ? "win" : "error");
        if (won) launchConfetti();
        updatePauseButton();
        window.setTimeout(() => playAgainButton.focus(), 200);
      }

      function launchConfetti() {
        const colors = ["#f15a50", "#ff963c", "#45bd72", "#42bfe8", "#9b68dc", "#ffd44f"];
        confettiLayer.replaceChildren();
        for (let index = 0; index < 48; index += 1) {
          const piece = document.createElement("i");
          piece.className = "confetti";
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.background = colors[index % colors.length];
          piece.style.setProperty("--duration", `${1.8 + Math.random() * 1.7}s`);
          piece.style.setProperty("--drift", `${-90 + Math.random() * 180}px`);
          piece.style.setProperty("--spin", `${360 + Math.random() * 720}deg`);
          piece.style.animationDelay = `${Math.random() * 0.5}s`;
          confettiLayer.appendChild(piece);
        }
        window.setTimeout(() => confettiLayer.replaceChildren(), 4000);
      }

      function showMainMenu() {
        clearHint();
        stopBattle();
        state.round += 1;
        state.inMenu = true;
        state.ended = true;
        setBoardBusy(false);
        state.paused = false;
        state.autoPaused = false;
        state.monsters = [];
        resultBackdrop.classList.remove("open");
        resultBackdrop.setAttribute("aria-hidden", "true");
        battleEffects.replaceChildren();
        monsterLayer.replaceChildren();
        confettiLayer.replaceChildren();
        mainMenu.classList.add("open");
        mainMenu.setAttribute("aria-hidden", "false");
        appShell.inert = true;
        appShell.setAttribute("aria-hidden", "true");
        document.body.classList.add("menu-open");
        menuHighScoreValue.textContent = NUMBER.format(state.highScore);
        updatePauseButton();
        window.setTimeout(() => startGameButton.focus(), 160);
      }

      function startGame() {
        clearHint();
        stopBattle();
        state.round += 1;
        const round = state.round;
        state.inMenu = false;
        mainMenu.classList.remove("open");
        mainMenu.setAttribute("aria-hidden", "true");
        appShell.inert = false;
        appShell.removeAttribute("aria-hidden");
        document.body.classList.remove("menu-open");
        resultBackdrop.classList.remove("open");
        resultBackdrop.setAttribute("aria-hidden", "true");
        confettiLayer.replaceChildren();
        battleEffects.replaceChildren();
        attackBanner.classList.remove("show");
        for (const icon of document.querySelectorAll("[data-attack-type]")) icon.classList.remove("active");
        state.board = createPlayableBoard();
        state.specials = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
        state.selected = null;
        state.score = 0;
        state.moves = MAX_MOVES;
        state.combo = 1;
        setBoardBusy(false);
        state.ended = false;
        state.paused = false;
        state.autoPaused = false;
        state.monsters = [];
        state.nextMonsterId = 1;
        state.wallHp = 100;
        state.defenseCharge = 0;
        state.barrageActive = false;
        state.defeated = 0;
        state.wave = 0;
        state.feedbackId = 0;
        state.hintTimer = null;
        state.hintCells = [];
        state.spawnClock = 0;
        renderBoard(new Set(Array.from({ length: SIZE * SIZE }, (_, index) => positionKey(Math.floor(index / SIZE), index % SIZE))));
        renderStats();
        renderBattle();
        updatePauseButton();
        startBattle(round);
        setActivity(`防线就绪，共 ${countPossibleMoves(state.board)} 种有效移动`);
        scheduleHint();
      }

      boardElement.addEventListener("click", (event) => {
        if (suppressClick) return;
        const position = tileFromEventTarget(event.target);
        if (position) selectTile(position);
      });

      boardElement.addEventListener("pointerdown", (event) => {
        const position = tileFromEventTarget(event.target);
        if (!position || state.busy || state.ended || state.paused) return;
        pointerStart = { ...position, x: event.clientX, y: event.clientY };
      });

      boardElement.addEventListener("pointerup", (event) => {
        if (!pointerStart || state.busy || state.ended || state.paused) {
          pointerStart = null;
          return;
        }
        const deltaX = event.clientX - pointerStart.x;
        const deltaY = event.clientY - pointerStart.y;
        const distance = Math.max(Math.abs(deltaX), Math.abs(deltaY));
        if (distance >= 20) {
          const target = { row: pointerStart.row, col: pointerStart.col };
          if (Math.abs(deltaX) > Math.abs(deltaY)) target.col += deltaX > 0 ? 1 : -1;
          else target.row += deltaY > 0 ? 1 : -1;
          if (target.row >= 0 && target.row < SIZE && target.col >= 0 && target.col < SIZE) {
            suppressClick = true;
            attemptSwap({ row: pointerStart.row, col: pointerStart.col }, target);
            window.setTimeout(() => { suppressClick = false; }, 0);
          }
        }
        pointerStart = null;
      });

      boardElement.addEventListener("pointercancel", () => {
        pointerStart = null;
      });

      boardElement.addEventListener("keydown", (event) => {
        const position = tileFromEventTarget(event.target);
        if (!position) return;
        const next = { ...position };
        if (event.key === "ArrowLeft") next.col -= 1;
        else if (event.key === "ArrowRight") next.col += 1;
        else if (event.key === "ArrowUp") next.row -= 1;
        else if (event.key === "ArrowDown") next.row += 1;
        else if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          selectTile(position);
          return;
        } else {
          return;
        }
        event.preventDefault();
        if (next.row >= 0 && next.row < SIZE && next.col >= 0 && next.col < SIZE) {
          getTile(next)?.focus({ preventScroll: true });
        }
      });

      pauseButton.addEventListener("click", () => {
        setPaused(!state.paused);
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          if (!state.ended && !state.paused) setPaused(true, true);
        } else if (state.autoPaused) {
          setPaused(false, true);
        }
      });

      soundButton.addEventListener("click", () => {
        state.soundOn = !state.soundOn;
        updateSoundButton();
        if (state.soundOn) playTone("select");
      });

      homeButton.addEventListener("click", showMainMenu);
      startGameButton.addEventListener("click", startGame);
      restartButton.addEventListener("click", startGame);
      playAgainButton.addEventListener("click", startGame);

      updateSoundButton();
      showMainMenu();
    })();
  </script>
</body>
</html>
